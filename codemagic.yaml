workflows:
  react-native-android:
    name: React Native Android
    instance_type: linux
    max_build_duration: 120
    environment:
      java: Java 17
      node: 18.17.0
      groups:
        - google_play
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Setup Android keystore
        script: |
          mkdir -p $HOME/.android
          echo "$ANDROID_KEYSTORE" | base64 --decode > $HOME/.android/upload-keystore.jks
      - name: Build Android release
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $PLAY_STORE_CREDENTIALS
        track: internal
        submit_as_draft: true

  react-native-ios:
    name: React Native iOS
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: latest
      node: 18.17.0
      groups:
        - app_store
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install --repo-update
      - name: Setup iOS certificate and provisioning profile
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE_ID.mobileprovision
          echo "$IOS_CERTIFICATE" | base64 --decode > /tmp/ios_certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/ios_certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
      - name: Build iOS app
        script: |
          cd ios
          xcodebuild -workspace Quran.xcworkspace \
            -scheme Quran \
            -configuration Release \
            -arch arm64 \
            build
      - name: Create IPA
        script: |
          cd ios
          xcodebuild -workspace Quran.xcworkspace \
            -scheme Quran \
            -configuration Release \
            -arch arm64 \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM_ID \
            PROVISIONING_PROFILE=$IOS_PROVISIONING_PROFILE_ID \
            build
    artifacts:
      - ios/build/Release-iphoneos/*.app
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  react-native-test:
    name: React Native Tests
    instance_type: linux
    max_build_duration: 60
    environment:
      node: 18.17.0
    triggering:
      events:
        - pull_request
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Check for build issues
        script: |
          npx expo export --platform android --output-dir .tmp_check 2>&1 | tail -5
          rm -rf .tmp_check || true
